<!DOCTYPE html>
<html>
<head>
<title>Fox Squad Swag - Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#111;
    color:white;
}

.header{
    text-align:center;
    padding:20px;
    background:#222;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background:#222;
    border-radius:10px;
    width:300px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:8px;
}

.button{
    background:#ff6600;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>Fox Squad Swag</h1>
    <h3>Select Your Gear</h3>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/300x250">
        <h2>Fox Squad Jersey</h2>
        <p>$65</p>
        <button class="button">Add to Order</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x250">
        <h2>Fox Squad Hoodie</h2>
        <p>$45</p>
        <button class="button">Add to Order</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x250">
        <h2>Fox Squad Headband</h2>
        <p>$20</p>
        <button class="button">Add to Order</button>
    </div>

</div>

</body>
</html>
