<!DOCTYPE html>
<html>
<head>
<title>Fox Squad Swag - Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial,sans-serif;margin:0;background:#111;color:white;}
.nav{display:flex;justify-content:space-between;padding:14px 18px;background:#0b0b0b;border-bottom:2px solid #ff6600;}
.nav a{color:white;text-decoration:none;font-weight:bold;}
.container{padding:20px;}
.product-card{background:#222;border-radius:12px;padding:18px;}
.product-card img{width:100%;height:220px;object-fit:cover;background:#333;border-radius:8px;}
.button{display:inline-block;background:#ff6600;color:white;text-decoration:none;border:none;padding:14px 20px;border-radius:8px;font-weight:bold;margin-top:18px;cursor:pointer;}
.description{white-space:pre-wrap;color:#ddd;line-height:1.5;}
.size-list{background:#111;border-radius:10px;padding:15px;margin-top:15px;}
label{display:block;margin-top:15px;font-weight:bold;}
select,input{width:100%;padding:12px;margin-top:6px;border-radius:8px;border:none;font-size:16px;}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.7);}
.modal-content{background:#222;margin:8% auto;padding:20px;border-radius:12px;width:90%;max-width:500px;}
.close{float:right;font-size:28px;cursor:pointer;}
.cart-count{font-size:14px;vertical-align:top;margin-left:2px;}
#toast{visibility:hidden;min-width:190px;background:#222;color:white;text-align:center;border:1px solid #ff6600;border-radius:10px;padding:12px 18px;position:fixed;z-index:999;left:50%;bottom:30px;transform:translateX(-50%);font-weight:bold;}
#toast.show{visibility:visible;}
</style>
</head>

<body>

<div class="nav">
    <a href="products.html">← Catalog</a>
    <a href="cart.html">🛒<span id="cartCount" class="cart-count"></span></a>
</div>

<div class="container" id="productContainer"></div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeOrderModal()">×</span>
        <h2 id="modalProductName"></h2>

        <label>Size Group</label>
        <select id="sizeGroup" onchange="populateSizeDropdown()"></select>

        <label>Size</label>
        <select id="size"></select>

        <div id="customFields"></div>

        <label>Quantity</label>
        <input id="quantity" type="number" min="1" value="1">

        <button class="button" onclick="addConfiguredProduct()">Add to Cart</button>
    </div>
</div>

<script src="app.js"></script>

<script>
let currentProduct;

function getProductIdFromUrl(){
    return new URLSearchParams(window.location.search).get("id");
}

function splitOptions(value){
    if(!value) return [];
    return value.split("|").map(v => v.trim()).filter(v => v);
}

async function loadProduct() {

    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    const products = await loadProducts();

    const product = products.find(p =>
        makeProductId(p.name) === productId
    );

    if (!product) {
        document.getElementById("productContainer").innerHTML =
            "<h2>Product Not Found</h2>";
        return;
    }

    renderProduct(product);
}

loadProduct();

function renderProduct(product){

    buildOptions(product);
}

function setupSizes(product){

    const groupSelect =
        document.getElementById("sizeGroup");

    const sizeSelect =
        document.getElementById("size");

    product.sizeGroups.forEach(group => {

        groupSelect.innerHTML += `
            <option value="${group}">
                ${group}
            </option>
        `;
    });

    function loadSizes(){

        const group =
            groupSelect.value.toLowerCase();

        const sizes =
            product.sizes[group] || [];

        sizeSelect.innerHTML = "";

        sizes.forEach(size => {

            sizeSelect.innerHTML += `
                <option>
                    ${size}
                </option>
            `;
        });
    }

    groupSelect.addEventListener(
        "change",
        loadSizes
    );

    loadSizes();
}

renderProduct();
</script>

</body>
</html>
